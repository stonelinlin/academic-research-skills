venue: acl
full_name: Annual Meeting of the Association for Computational Linguistics
type: conference
fields: [nlp, computational-linguistics, language-models, dialogue]
deadlines:
  abstract: mid-February
  full_paper: late-February
page_limits:
  main_text: 8
  references: unlimited
  appendix: unlimited
  rebuttal: 1500
template:
  latex_class: acl
  bibtex_style: acl_natbib
  template_url: https://github.com/acl-org/acl-style-files
  local_template: acl_2026.tex
review_format:
  num_reviewers: 3
  scoring_scale: "1-5"
  required_sections: [paper_summary, summary_of_strengths, summary_of_weaknesses, comments_suggestions_typos, soundness, excitement, reproducibility, ethical_concerns, reviewer_confidence, overall_recommendation]
  rebuttal_phase: yes
  rebuttal_word_limit: 1500
disclosure:
  ai_use_required: yes
  policy_url: https://2024.aclweb.org/calls/main_conference_papers/
  required_statement_location: limitations_section
  notes: "ACL specifically requires AI assistant use disclosure in the Limitations section."
reproducibility:
  checklist_required: yes
  checklist_url: https://aclrollingreview.org/responsibleNLPresearch/
  code_release_required: recommended
  notes: "Responsible NLP Research Checklist is mandatory."
broader_impact:
  required: yes
  section_name: Broader Impact / Ethics Statement
  notes: "ACL has separate Ethics Statement section, distinct from Limitations."
notes: |
  - ARR (ACL Rolling Review) submission flow available.
  - Limitations section is MANDATORY (not optional).
  - Ethics Statement is MANDATORY.
  - Rebuttal is short (1500 words across all reviewers); prioritize ruthlessly.
